version: '3.8'

services:
  backend:
    build: ./backend
    container_name: collabx_backend
    ports:
      - "5050:5050"
    environment:
      - PORT=5050
      - JWT_SECRET=collabx_secret_production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    container_name: collabx_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5050/api
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host 0.0.0.0
